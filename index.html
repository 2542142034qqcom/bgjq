<!doctype html>
<html lang="zh-CN">

    <link rel="stylesheet" href="./styles.css" />

    <div class="app" id="app">

          <div class="brand-subtitle">白 · 绿主题</div>

        <div class="sidebar-actions">
          <input id="search" class="search" type="search" placeholder="搜索标题…" autocomplete="off" />
          <div class="sidebar-links">
            <a class="chip" href="#/邦国文库/README.md">总目录</a>

        <article id="content" class="content">
          <div class="content-loading">正在加载内容…</div>
        </article>

        <footer class="footer">
          <span>部署：Cloudflare Pages（纯静态）</span>
        </footer>
      </main>
    </div>

    <!-- Markdown 渲染库（无需构建步骤） -->

    <script src="./app.js"></script>

</html>
